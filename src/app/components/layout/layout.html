<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" [class.active]="sidebarOpen()">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
        </div>
        <span class="sidebar-brand-text">MedCross</span>
      </div>
      <div class="user-profile">
        <button class="user-avatar profile-menu-btn" (click)="toggleProfileMenu($event)" aria-label="Open profile menu">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>
        <div class="user-info">
          <div class="user-name">{{ patient()?.name || 'Patient' }}</div>
          <div class="user-id">ID: {{ patient()?.number || '---' }}</div>
        </div>
        <div class="profile-menu" *ngIf="profileMenuOpen()">
          <button class="profile-menu-item" (click)="goToProfile()">Profile</button>
          <button class="profile-menu-item" (click)="changePassword()">Change Password</button>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-section-title">Menu</p>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Dashboard</span>
      </a>
      <a routerLink="/vitals" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
        <span>Add Vitals</span>
      </a>
      <a routerLink="/tasks" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
        <span>Daily Tasks</span>
      </a>
      <a routerLink="/history" routerLinkActive="active" class="nav-item" (click)="closeSidebar()">
        <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 109 9h-2a7 7 0 11-7-7V3zm-1 5v5.59l4.3 4.3 1.4-1.42-3.7-3.67V8H12z"/></svg>
        <span>History</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" [class.active]="sidebarOpen()" (click)="closeSidebar()"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="hamburger" [class.active]="sidebarOpen()" (click)="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <span class="mobile-title">MedCross</span>
      <button class="mobile-avatar profile-menu-btn" (click)="toggleProfileMenu($event)" aria-label="Open profile menu">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </button>
      <div class="profile-menu mobile" *ngIf="profileMenuOpen()">
        <button class="profile-menu-item" (click)="goToProfile()">Profile</button>
        <button class="profile-menu-item" (click)="changePassword()">Change Password</button>
      </div>
    </div>

    <!-- Router Outlet for nested content -->
    <router-outlet></router-outlet>
    <app-toast></app-toast>
  </main>
</div>
