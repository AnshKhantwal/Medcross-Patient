<div class="profile-back-row-flat">
  <button class="back-btn-flat" type="button" (click)="goBack()" aria-label="Back to Dashboard">← Back to Dashboard</button>
</div>
<div class="profile-card">
  <h2 class="change-password-title">Change Password</h2>
  <form [formGroup]="form" (ngSubmit)="changePassword()" class="change-password-form">
    <div class="form-group modern">
      <div class="input-wrapper">
        <input id="currentPassword" formControlName="currentPassword" type="password" required />
        <label for="currentPassword">Current Password</label>
      </div>
      <div class="error" *ngIf="form.controls.currentPassword.invalid && form.controls.currentPassword.touched">Current password is required.</div>
    </div>
    <div class="form-group modern">
      <div class="input-wrapper">
        <input id="newPassword" formControlName="newPassword" type="password" required />
        <label for="newPassword">New Password</label>
      </div>
      <div class="error" *ngIf="form.controls.newPassword.invalid && form.controls.newPassword.touched">New password (min 8 chars) required.</div>
    </div>
    <div class="form-group modern">
      <div class="input-wrapper">
        <input id="confirmPassword" formControlName="confirmPassword" type="password" required />
        <label for="confirmPassword">Confirm New Password</label>
      </div>
      <div class="error" *ngIf="form.controls.confirmPassword.invalid && form.controls.confirmPassword.touched">Please confirm your new password.</div>
      <div class="error" *ngIf="form.controls.confirmPassword.touched && !passwordsMatch()">Passwords do not match.</div>
    </div>
    <button type="submit" class="save-btn" [disabled]!="isValid()">Change Password</button>
  </form>
</div>
