<div class="login-screen">
  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <svg viewBox="0 0 24 24">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
        </svg>
      </div>
      <h1 class="login-title">MedCross</h1>
      <p class="login-subtitle">Your personal health companion</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label>Patient Number</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            [ngModel]="patientNumber()" 
            (ngModelChange)="patientNumber.set($event)"
            name="patientNumber"
            placeholder="Enter your patient number" 
            required>
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            [ngModel]="password()" 
            (ngModelChange)="password.set($event)"
            name="password"
            placeholder="Enter your password" 
            required>
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        @if (showError()) {
          <div class="error-message">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            Invalid credentials. Please try again.
          </div>
        }
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="login-footer">
      <p class="login-hint">
        First time? Use password: <strong>medcross</strong><br>
        You can change it after logging in
      </p>
    </div>
  </div>
</div>
