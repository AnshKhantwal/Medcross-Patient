<div class="dashboard-content">
  <div class="zen-welcome">
    <h1 class="zen-greeting">Hi, <span>{{ patient()?.name || 'Patient' }}</span>!</h1>
    <p class="zen-date">{{ currentDate() }}</p>
    
    <div class="profile-image-container">
      <img src="image.png" alt="Profile" class="profile-image">
    </div>
    
    <p class="zen-quote">"Take a deep breath. You're doing great."</p>
    <p class="zen-author">— Your Health Companion</p>
  </div>
</div>

<!-- FAB Button -->
<div class="fab-overlay" [class.active]="fabOpen()" (click)="closeFab()"></div>
<div class="fab-container">
  <div class="fab-menu" [class.active]="fabOpen()">
    <div class="fab-menu-item" (click)="goToVitals()">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
      <span>Add Vitals</span>
    </div>
    <div class="fab-menu-item" (click)="goToTasks()">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
      <span>Daily Tasks</span>
    </div>
  </div>
  <button class="fab-btn" [class.active]="fabOpen()" (click)="toggleFab()">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>
</div>
